; PlatformIO 项目配置 — Cardputer 电子词典

[env:m5stack-stamps3]
upload_port = COM5
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200

board_build.flash_size = 8MB
board_build.psram_type = opi

build_flags =
    -Os
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM=y
    -DCONFIG_SPIRAM_MODE_OCT=y
    -DCONFIG_SPIRAM_USE_CAPS_ALLOC=y

lib_deps =
    m5stack/M5Cardputer@^1.0.3
    m5stack/M5GFX@^0.2.17

; 烧录前：
;   1. 把 device/data/* 拷贝到 SD 卡的 /dictcard/ 子目录
;   2. pio run --target upload